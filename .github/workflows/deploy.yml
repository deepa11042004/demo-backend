name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE:   ${{ secrets.DOCKERHUB_USERNAME }}/demo-backend
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  FRONTEND_STACK: react-demo-stack

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Build & push Docker image to Docker Hub ───────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 3. Configure AWS credentials ─────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 4. Get ASG name from the frontend stack ───────────
      # The backend shares the same ASG as the frontend.
      # We look up the ASG name from the frontend CloudFormation stack
      # and use tag-based SSM to update all running instances at once.
      - name: Get ASG name
        id: get-asg
        run: |
          ASG_NAME=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.FRONTEND_STACK }} \
            --query 'Stacks[0].Outputs[?OutputKey==`AutoScalingGroupName`].OutputValue' \
            --output text)
          echo "asg_name=$ASG_NAME" >> $GITHUB_OUTPUT
          echo "ASG: $ASG_NAME"

      # ── 5. Wait for an InService instance to have SSM online ──
      - name: Wait for SSM agent
        run: |
          ASG_NAME="${{ steps.get-asg.outputs.asg_name }}"
          for i in $(seq 1 20); do
            INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$ASG_NAME" \
              --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
              --output text | awk '{print $1}')

            if [ -n "$INSTANCE_ID" ]; then
              STATUS=$(aws ssm describe-instance-information \
                --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
                --query 'InstanceInformationList[0].PingStatus' \
                --output text 2>/dev/null || echo "None")
              echo "Attempt $i — $INSTANCE_ID SSM: $STATUS"
              if [ "$STATUS" = "Online" ]; then break; fi
            else
              echo "Attempt $i — No InService instances yet"
            fi

            [ "$i" = "20" ] && { echo "Timed out waiting for SSM"; exit 1; }
            sleep 15
          done

      # ── 6. Pull latest image and restart backend on all instances ──
      - name: Deploy backend container on all ASG instances
        run: |
          ASG_NAME="${{ steps.get-asg.outputs.asg_name }}"
          IMAGE="${{ env.DOCKER_IMAGE }}:latest"

          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:aws:autoscaling:groupName,Values=$ASG_NAME" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy nexus-api ${{ github.sha }}" \
            --parameters "commands=[
              \"until docker info > /dev/null 2>&1; do sleep 5; done\",
              \"docker pull $IMAGE\",
              \"docker stop nexus-api || true\",
              \"docker rm   nexus-api || true\",
              \"docker run -d --name nexus-api -p 3001:3001 --restart unless-stopped $IMAGE\",
              \"echo Backend updated\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "Command ID: $CMD_ID"

          for i in $(seq 1 24); do
            STATUSES=$(aws ssm list-command-invocations \
              --command-id "$CMD_ID" \
              --query 'CommandInvocations[*].Status' \
              --output text 2>/dev/null || echo "")

            echo "  Attempt $i — ${STATUSES:-Pending}"

            if echo "$STATUSES" | grep -E "Failed|TimedOut|Cancelled" > /dev/null 2>&1; then
              echo "Command failed on one or more instances"
              exit 1
            fi

            if [ -n "$STATUSES" ] && ! echo "$STATUSES" | grep -E "Pending|InProgress|Waiting|Delayed" > /dev/null 2>&1; then
              echo "Backend updated on all instances"
              exit 0
            fi

            [ "$i" = "24" ] && { echo "Timed out"; exit 1; }
            sleep 5
          done
