name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE:   ${{ secrets.DOCKERHUB_USERNAME }}/nexus-api
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  FRONTEND_STACK: react-demo-stack

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Build & push Docker image to Docker Hub ───────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 3. Configure AWS credentials ─────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── 4. Get EC2 instance ID from the frontend stack ───
      # The backend shares the same EC2 as the frontend.
      # We look up the instance ID from the frontend CloudFormation stack
      # rather than storing it as a secret — it stays in sync automatically.
      - name: Get EC2 instance ID
        id: get-instance
        run: |
          INSTANCE_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.FRONTEND_STACK }} \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "EC2 Instance ID: $INSTANCE_ID"

      # ── 5. Wait for SSM agent to come online ─────────────
      - name: Wait for SSM agent
        run: |
          INSTANCE_ID="${{ steps.get-instance.outputs.instance_id }}"
          echo "Waiting for SSM agent on $INSTANCE_ID..."

          for i in $(seq 1 20); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "None")

            echo "Attempt $i — SSM status: $STATUS"

            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online"
              break
            fi

            [ "$i" = "20" ] && { echo "SSM agent did not come online in time"; exit 1; }
            sleep 15
          done

      # ── 6. Pull latest image and restart backend container ──
      - name: Deploy backend container on EC2
        run: |
          INSTANCE_ID="${{ steps.get-instance.outputs.instance_id }}"
          IMAGE="${{ env.DOCKER_IMAGE }}:latest"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy nexus-api ${{ github.sha }}" \
            --parameters "commands=[
              \"until docker info > /dev/null 2>&1; do sleep 5; done\",
              \"docker pull $IMAGE\",
              \"docker stop nexus-api || true\",
              \"docker rm   nexus-api || true\",
              \"docker run -d --name nexus-api -p 3001:3001 --restart unless-stopped $IMAGE\",
              \"echo Backend updated\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "Command ID: $CMD_ID"

          for i in $(seq 1 24); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "  Attempt $i — $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Backend deployed successfully"
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                --query 'StandardOutputContent' --output text
              aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi

            [ "$i" = "24" ] && { echo "Timed out waiting for command"; exit 1; }
            sleep 5
          done
